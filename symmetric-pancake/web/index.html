<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Copilot Wrapped</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>%F0%9F%94%A5</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08080c; --bg2:#0d0d14; --ink:#f4f4fb; --muted:#9aa0b4; --muted2:#6b7186;
    --card:rgba(255,255,255,0.045); --card-bd:rgba(255,255,255,0.09);
    --accent:#a78bfa; --accent2:#7c3aed;
    --display:'Space Grotesk',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }
  body{ background:var(--bg); color:var(--ink); font-family:var(--body);
    -webkit-font-smoothing:antialiased; overflow-x:hidden; }
  ::selection{ background:var(--accent); color:#0a0a0f; }

  /* scroll container with snap */
  #scroller{ height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory; scroll-behavior:smooth; }
  .panel{ min-height:100vh; scroll-snap-align:start; position:relative; display:flex;
    flex-direction:column; justify-content:center; align-items:center; padding:7vh 6vw;
    overflow:hidden; }
  .panel .inner{ position:relative; z-index:2; width:100%; max-width:1080px; }

  /* animated gradient orbs */
  .orb{ position:absolute; border-radius:50%; filter:blur(80px); opacity:.5; z-index:0;
    pointer-events:none; transition:background 1.2s ease; }
  .orb.a{ width:46vw; height:46vw; top:-12vw; right:-10vw; background:var(--accent); animation:float1 14s ease-in-out infinite; }
  .orb.b{ width:38vw; height:38vw; bottom:-14vw; left:-12vw; background:var(--accent2); opacity:.42; animation:float2 18s ease-in-out infinite; }
  @keyframes float1{ 0%,100%{ transform:translate(0,0) scale(1);} 50%{ transform:translate(-4vw,4vw) scale(1.08);} }
  @keyframes float2{ 0%,100%{ transform:translate(0,0) scale(1);} 50%{ transform:translate(5vw,-3vw) scale(1.12);} }
  .grain{ position:absolute; inset:0; z-index:1; opacity:.05; pointer-events:none; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }

  /* reveal animation */
  .reveal{ opacity:0; transform:translateY(26px); transition:opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1); }
  .panel.in .reveal{ opacity:1; transform:none; }
  .panel.in .reveal:nth-child(2){ transition-delay:.07s; } .panel.in .reveal:nth-child(3){ transition-delay:.14s; }
  .d1{ transition-delay:.08s; } .d2{ transition-delay:.16s; } .d3{ transition-delay:.24s; } .d4{ transition-delay:.32s; } .d5{ transition-delay:.40s; }

  .eyebrow{ font-family:var(--display); font-size:13px; font-weight:600; letter-spacing:.32em;
    text-transform:uppercase; color:var(--accent); margin-bottom:18px; display:flex; align-items:center; gap:10px; }
  .eyebrow::before{ content:""; width:26px; height:2px; background:var(--accent); border-radius:2px; }

  h1.cover{ font-family:var(--display); font-weight:700; font-size:clamp(48px,11vw,150px); line-height:.95;
    letter-spacing:-.03em; }
  h1.cover .grad{ background:linear-gradient(120deg,#fff 10%,var(--accent) 60%,var(--accent2) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  .cover-sub{ font-size:clamp(16px,2.2vw,23px); color:var(--muted); margin-top:24px; max-width:620px; line-height:1.5; }
  .cover-meta{ margin-top:30px; display:flex; gap:10px; flex-wrap:wrap; }
  .pill{ font-family:var(--display); font-size:13px; font-weight:500; color:var(--ink);
    background:var(--card); border:1px solid var(--card-bd); border-radius:999px; padding:9px 16px; }
  .pill b{ color:var(--accent); }

  .section-title{ font-family:var(--display); font-weight:700; font-size:clamp(30px,5vw,58px);
    letter-spacing:-.02em; line-height:1.05; }
  .section-lead{ color:var(--muted); font-size:clamp(15px,1.7vw,19px); margin-top:14px; max-width:640px; line-height:1.55; }

  /* big stat counters */
  .bignums{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-top:40px; }
  .bignum{ background:var(--card); border:1px solid var(--card-bd); border-radius:20px; padding:22px 20px; }
  .bignum .n{ font-family:var(--display); font-weight:700; font-size:clamp(34px,5vw,56px); line-height:1;
    background:linear-gradient(180deg,#fff,var(--accent)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .bignum .l{ margin-top:10px; font-size:13px; color:var(--muted); letter-spacing:.04em; text-transform:uppercase; font-weight:500; }

  /* repo header */
  .repo-head{ display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; }
  .rank{ font-family:var(--display); font-weight:700; font-size:clamp(40px,7vw,84px); line-height:.8;
    color:transparent; -webkit-text-stroke:2px var(--accent); opacity:.85; }
  .repo-name{ font-family:var(--display); font-weight:700; font-size:clamp(34px,6vw,72px); letter-spacing:-.02em;
    background:linear-gradient(110deg,#fff,var(--accent)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .repo-path{ font-family:'Space Grotesk',monospace; font-size:13px; color:var(--muted2); margin-top:6px;
    background:var(--card); border:1px solid var(--card-bd); border-radius:8px; padding:5px 10px; display:inline-block; }

  .repo-grid{ display:grid; grid-template-columns:1.05fr .95fr; gap:22px; margin-top:30px; align-items:start; }
  @media(max-width:860px){ .repo-grid{ grid-template-columns:1fr; } }

  .stat-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .stat{ background:var(--card); border:1px solid var(--card-bd); border-radius:14px; padding:14px 14px; }
  .stat .n{ font-family:var(--display); font-weight:700; font-size:26px; color:var(--ink); }
  .stat .n.accent{ color:var(--accent); }
  .stat .l{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-top:4px; }

  .langs{ margin-top:18px; }
  .langs h4, .deeds h4{ font-family:var(--display); font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--muted2); margin-bottom:12px; font-weight:600; }
  .lang{ display:flex; align-items:center; gap:10px; margin-bottom:9px; font-size:13px; }
  .lang .nm{ width:84px; color:var(--ink); font-weight:500; }
  .lang .track{ flex:1; height:8px; background:rgba(255,255,255,.06); border-radius:6px; overflow:hidden; }
  .lang .fill{ height:100%; width:0; border-radius:6px; transition:width 1.1s cubic-bezier(.2,.8,.2,1); }
  .panel.in .lang .fill{ width:var(--w); }
  .lang .ct{ width:38px; text-align:right; color:var(--muted); font-size:12px; }

  .deeds{ margin-top:20px; }
  .deeds ul{ list-style:none; display:flex; flex-direction:column; gap:7px; }
  .deeds li{ font-size:13.5px; color:var(--muted); padding-left:18px; position:relative; line-height:1.4; }
  .deeds li::before{ content:""; position:absolute; left:0; top:7px; width:7px; height:7px; border-radius:2px;
    background:var(--accent); }

  /* the roast card */
  .roast{ background:linear-gradient(160deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
    border:1px solid var(--card-bd); border-radius:22px; padding:26px 26px; position:relative; overflow:hidden; }
  .roast::before{ content:""; position:absolute; inset:0; background:radial-gradient(120% 120% at 100% 0%, color-mix(in srgb,var(--accent) 22%, transparent), transparent 60%); pointer-events:none; }
  .roast .tag{ display:inline-flex; align-items:center; gap:8px; font-family:var(--display); font-weight:600;
    font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); margin-bottom:14px; }
  .roast .verdict{ font-family:var(--display); font-weight:600; font-size:clamp(20px,2.6vw,30px); line-height:1.2;
    color:var(--ink); margin-bottom:18px; }
  .roast ul{ list-style:none; display:flex; flex-direction:column; gap:12px; }
  .roast li{ font-size:15px; line-height:1.5; color:#e3e5f1; padding-left:26px; position:relative; }
  .roast li::before{ content:"🔥"; position:absolute; left:0; top:0; font-size:14px; }

  /* superlatives */
  .awards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:16px; margin-top:38px; }
  .award{ background:var(--card); border:1px solid var(--card-bd); border-radius:20px; padding:24px;
    position:relative; overflow:hidden; }
  .award .em{ font-size:34px; }
  .award .aw{ font-family:var(--display); font-weight:700; font-size:19px; margin-top:12px; }
  .award .rp{ font-size:13px; color:var(--accent); font-weight:600; margin-top:4px; }
  .award .ln{ font-size:13.5px; color:var(--muted); margin-top:12px; line-height:1.5; }

  /* final verdict */
  .final-verdict{ font-family:var(--display); font-weight:600; font-size:clamp(26px,4.4vw,52px); line-height:1.18;
    letter-spacing:-.015em; max-width:920px; }
  .final-verdict .hl{ background:linear-gradient(110deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  .credit{ margin-top:36px; color:var(--muted2); font-size:13.5px; }
  .credit b{ color:var(--muted); }
  .btnrow{ margin-top:26px; display:flex; gap:12px; flex-wrap:wrap; }
  .btn{ font-family:var(--display); font-weight:600; font-size:14px; color:#0a0a0f; cursor:pointer;
    background:linear-gradient(110deg,var(--accent),var(--accent2)); border:0; border-radius:999px; padding:13px 24px;
    transition:transform .15s ease, filter .15s ease; }
  .btn:hover{ transform:translateY(-2px); filter:brightness(1.08); }
  .btn.ghost{ background:transparent; color:var(--ink); border:1px solid var(--card-bd); }

  /* top progress + side nav */
  #progress{ position:fixed; top:0; left:0; height:3px; width:0; z-index:50;
    background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .2s ease, background 1s ease; }
  #dots{ position:fixed; right:26px; top:50%; transform:translateY(-50%); z-index:50;
    display:flex; flex-direction:column; gap:13px; }
  #dots button{ width:10px; height:10px; border-radius:50%; border:1.5px solid var(--muted2);
    background:transparent; cursor:pointer; padding:0; transition:all .25s ease; }
  #dots button.active{ background:var(--accent); border-color:var(--accent); transform:scale(1.25); }
  @media(max-width:680px){ #dots{ display:none; } }

  .scrollcue{ position:absolute; bottom:34px; left:50%; transform:translateX(-50%); z-index:3;
    font-family:var(--display); font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:var(--muted2);
    display:flex; flex-direction:column; align-items:center; gap:8px; }
  .scrollcue .chev{ width:18px; height:18px; border-right:2px solid var(--muted2); border-bottom:2px solid var(--muted2);
    transform:rotate(45deg); animation:bob 1.6s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{ transform:rotate(45deg) translate(0,0); opacity:.5;} 50%{ transform:rotate(45deg) translate(3px,3px); opacity:1;} }

  .navhint{ position:fixed; bottom:18px; left:50%; transform:translateX(-50%); z-index:50;
    font-size:11px; color:var(--muted2); letter-spacing:.12em; }

  /* ---- repository graph (constellation of adaptive cards) ---- */
  .graph-inner{ max-width:1200px; }
  .graph-head{ display:flex; justify-content:space-between; align-items:flex-end; gap:24px; flex-wrap:wrap; }
  .mode-toggle{ display:flex; align-items:center; gap:12px; }
  .mt-label{ font-family:var(--display); font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--muted2); }
  .seg{ display:inline-flex; background:var(--card); border:1px solid var(--card-bd); border-radius:999px; padding:4px; gap:4px; }
  .seg-btn{ font-family:var(--display); font-weight:600; font-size:13px; color:var(--muted); background:transparent; border:0;
    cursor:pointer; padding:9px 16px; border-radius:999px; transition:all .2s ease; }
  .seg-btn:hover{ color:var(--ink); }
  .seg-btn.active{ color:#0a0a0f; background:linear-gradient(110deg,var(--accent),var(--accent2)); }

  .graph-stage{ position:relative; width:100%; height:min(66vh,582px); margin-top:30px; }
  .edges{ position:absolute; inset:0; width:100%; height:100%; z-index:1; overflow:visible;
    opacity:0; transition:opacity 1s ease .15s; }
  .panel.in .edges{ opacity:1; }
  .edges line.edge{ stroke-opacity:.32; filter:drop-shadow(0 0 2px currentColor);
    transition:stroke-opacity .25s ease, stroke-width .2s ease; }
  .edges line.edge.hot{ stroke-opacity:.85; }

  .hub{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:3; width:128px; height:128px;
    display:flex; align-items:center; justify-content:center; pointer-events:none; }
  .hub-ring{ position:absolute; inset:0; border-radius:50%; border:1px solid var(--card-bd);
    background:radial-gradient(circle at 50% 35%, color-mix(in srgb,var(--accent) 28%, transparent), transparent 70%);
    animation:hubpulse 4.5s ease-in-out infinite; }
  @keyframes hubpulse{ 0%,100%{ transform:scale(1); opacity:.8 } 50%{ transform:scale(1.07); opacity:1 } }
  .hub-core{ position:relative; z-index:2; width:92px; height:92px; border-radius:50%;
    background:linear-gradient(160deg,rgba(255,255,255,.13),rgba(255,255,255,.03)); border:1px solid var(--card-bd);
    display:flex; flex-direction:column; align-items:center; justify-content:center; backdrop-filter:blur(6px); }
  .hub-you{ font-family:var(--display); font-weight:700; font-size:15px; letter-spacing:.18em; color:var(--ink); }
  .hub-user{ font-size:11px; color:var(--accent); margin-top:2px; max-width:80px; overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap; }

  .node{ position:absolute; transform:translate(-50%,-50%) scale(.78); z-index:2; border:0; background:transparent;
    padding:0; cursor:pointer; opacity:0;
    transition:opacity .6s cubic-bezier(.2,.8,.2,1), transform .6s cubic-bezier(.2,.8,.2,1); }
  .panel.in .node{ opacity:1; transform:translate(-50%,-50%) scale(var(--scale,1)); }
  .node-card{ width:var(--cardw,212px); text-align:left; background:linear-gradient(160deg,rgba(255,255,255,.085),rgba(255,255,255,.025));
    border:1px solid var(--card-bd); border-radius:18px; padding:15px 16px 14px; position:relative; overflow:hidden;
    backdrop-filter:blur(8px); transition:transform .2s ease, box-shadow .25s ease, border-color .25s ease; }
  .node-card::before{ content:""; position:absolute; left:0; top:0; right:0; height:3px;
    background:linear-gradient(90deg,var(--accent),var(--accent2)); }
  .node:hover .node-card{ transform:translateY(-6px); border-color:color-mix(in srgb,var(--accent) 55%, var(--card-bd));
    box-shadow:0 18px 42px -16px color-mix(in srgb,var(--accent) 60%, transparent); }
  .node:focus-visible{ outline:none; }
  .node:focus-visible .node-card{ border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 32%, transparent); }
  .node-top{ display:flex; align-items:center; justify-content:space-between; }
  .node-dot{ width:10px; height:10px; border-radius:50%; background:linear-gradient(120deg,var(--accent),var(--accent2));
    box-shadow:0 0 10px var(--accent); }
  .node-rank{ font-family:var(--display); font-weight:700; font-size:12px; color:var(--muted2); letter-spacing:.06em; }
  .node-name{ font-family:var(--display); font-weight:700; font-size:18px; margin-top:9px; color:var(--ink); line-height:1.12;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .node-path{ font-family:'Space Grotesk',monospace; font-size:10.5px; color:var(--muted2); margin-top:3px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .node-stats{ display:flex; gap:14px; margin-top:12px; font-size:10.5px; color:var(--muted); text-transform:lowercase; }
  .node-stats b{ font-family:var(--display); font-size:15px; color:var(--ink); display:block; line-height:1; margin-bottom:2px; }
  .node-lang{ display:flex; align-items:center; gap:7px; margin-top:12px; font-size:12px; color:var(--muted); }
  .node-lang .ld{ width:9px; height:9px; border-radius:2px; flex:0 0 auto; }
  .node-cue{ margin-top:13px; font-family:var(--display); font-weight:600; font-size:11px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--accent); display:flex; align-items:center; gap:6px; opacity:.9; }
  .node:hover .node-cue{ gap:9px; }
  .node-cue span{ transition:transform .2s ease; }
  .node:hover .node-cue span{ transform:translateX(3px); }

  .graph-hint{ margin-top:22px; font-size:13px; color:var(--muted2); text-align:center; }
  .graph-hint b{ color:var(--accent); font-weight:600; }

  @media(max-width:760px){
    .graph-stage{ height:auto; display:flex; flex-direction:column; gap:14px; margin-top:22px; }
    .edges,.hub{ display:none; }
    .node{ position:static; transform:none!important; opacity:1; width:100%; transition-delay:0s!important; }
    .node-card{ width:100%; }
  }

  /* ---- enlarge modal ---- */
  #modal{ position:fixed; inset:0; z-index:100; display:none; align-items:center; justify-content:center; padding:5vh 5vw; }
  .modal-backdrop{ position:absolute; inset:0; background:rgba(4,4,8,.72); backdrop-filter:blur(10px);
    opacity:0; transition:opacity .3s ease; }
  #modal.open .modal-backdrop{ opacity:1; }
  .modal-card{ position:relative; z-index:2; width:100%; max-width:1060px; max-height:90vh; overflow-y:auto;
    background:linear-gradient(160deg,var(--bg2),#0a0a10); border:1px solid var(--card-bd); border-radius:26px;
    padding:36px 40px; box-shadow:0 40px 120px -30px color-mix(in srgb,var(--accent) 50%, #000);
    transform:translateY(18px) scale(.96); opacity:0;
    transition:transform .35s cubic-bezier(.2,.8,.2,1), opacity .3s ease; }
  #modal.open .modal-card{ transform:none; opacity:1; }
  .modal-card::before{ content:""; position:absolute; left:0; right:0; top:0; height:4px; border-radius:26px 26px 0 0;
    background:linear-gradient(90deg,var(--accent),var(--accent2)); }
  .modal-close{ position:absolute; top:16px; right:16px; z-index:3; width:38px; height:38px; border-radius:50%;
    background:var(--card); border:1px solid var(--card-bd); color:var(--ink); font-size:15px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:all .2s ease; }
  .modal-close:hover{ background:color-mix(in srgb,var(--accent) 30%, var(--card)); transform:rotate(90deg); }
  .modal-card .reveal{ opacity:1; transform:none; }
  .modal-card .eyebrow{ color:var(--accent); }
  .modal-card .lang .fill{ width:0; }
  #modal.open .lang .fill{ width:var(--w); }
  .modal-card .repo-grid{ margin-top:24px; }
</style>
</head>
<body>
  <div id="progress"></div>
  <div id="dots"></div>
  <div class="navhint">scroll &middot; or use &uarr; &darr; / space</div>
  <div id="scroller"></div>

  <div id="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" id="modalCard">
      <button class="modal-close" id="modalClose" aria-label="Close">&#10005;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="wrap-data.js" onerror="window.__noJs=true"></script>
  <script>
  "use strict";
  (async function(){
    let DATA = window.WRAP_DATA;
    if(!DATA){ try{ DATA = await (await fetch('wrap-data.json')).json(); }catch(e){} }
    const root = document.getElementById('scroller');
    if(!DATA){ root.innerHTML = '<div class="panel"><div class="inner"><h1 class="cover">No data found</h1></div></div>'; return; }

    const esc = s => String(s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    const fmt = n => Number(n).toLocaleString('en-US');

    // ---- build panels ----
    const panels = [];
    const t = DATA.meta.totals;

    // cover
    panels.push({ accent:'#a78bfa', accent2:'#7c3aed', html:`
      <div class="inner">
        <div class="eyebrow reveal">${esc(DATA.meta.dateRange)}</div>
        <h1 class="cover reveal"><span class="grad">Copilot</span><br><span class="grad">Wrapped</span></h1>
        <p class="cover-sub reveal d1">${esc(DATA.meta.subtitle)}</p>
        <div class="cover-meta reveal d2">
          <span class="pill">@<b>${esc(DATA.meta.user)}</b></span>
          <span class="pill"><b>${fmt(t.repos)}</b> repos</span>
          <span class="pill"><b>${fmt(t.sessions)}</b> sessions</span>
          <span class="pill"><b>${fmt(t.turns)}</b> messages</span>
        </div>
      </div>
      <div class="scrollcue">Begin<span class="chev"></span></div>` });

    // overview
    panels.push({ accent:'#a78bfa', accent2:'#7c3aed', html:`
      <div class="inner">
        <div class="eyebrow reveal">By the numbers</div>
        <h2 class="section-title reveal d1">You and Copilot,<br>this year.</h2>
        <p class="section-lead reveal d2">Across ${fmt(t.repos)} repositories you turned Copilot into a very patient colleague. Here's the damage.</p>
        <div class="bignums">
          ${[['repos',t.repos],['sessions',t.sessions],['messages',t.turns],['files',t.files],['commits',t.commits||0],['pull requests',t.prs||0]]
            .map((s,i)=>`<div class="bignum reveal d${Math.min(i+1,5)}"><div class="n" data-count="${s[1]}">0</div><div class="l">${s[0]}</div></div>`).join('')}
        </div>
      </div>` });

    // repository graph (constellation of adaptive cards)
    panels.push({ accent:'#a78bfa', accent2:'#7c3aed', graph:true, html:`
      <div class="inner graph-inner">
        <div class="graph-head">
          <div>
            <div class="eyebrow reveal">The constellation</div>
            <h2 class="section-title reveal d1">Your repositories</h2>
          </div>
          <div class="mode-toggle reveal d2">
            <span class="mt-label">On click</span>
            <div class="seg" id="modeSeg">
              <button class="seg-btn" data-mode="scroll">Scroll to page</button>
              <button class="seg-btn" data-mode="enlarge">Enlarge card</button>
            </div>
          </div>
        </div>
        <div class="graph-stage" id="graphStage"></div>
        <div class="graph-hint" id="graphHint"></div>
      </div>` });

    // ---- repo detail builders (shared by per-repo panels + enlarge modal) ----
    const repoPanelIndex = {};
    const repoStat=(n,l,acc)=>`<div class="stat"><div class="n ${acc?'accent':''}">${fmt(n)}</div><div class="l">${l}</div></div>`;
    function repoHeadHTML(r){
      return `<div class="eyebrow reveal">Repository ${r.rank} of ${DATA.repos.length}</div>
        <div class="repo-head reveal d1">
          <div class="rank">${r.rank<10?'0':''}${r.rank}</div>
          <div><div class="repo-name">${esc(r.name)}</div>
            <span class="repo-path">${esc(r.fullRepo)}</span></div>
        </div>`;
    }
    function repoGridHTML(r){
      const s=r.stats, c=r.contributions;
      const maxL=Math.max.apply(null,r.languages.map(l=>l.count))||1;
      return `<div class="repo-grid">
            <div>
              <div class="stat-row reveal d2">
                ${repoStat(s.sessions,'Sessions')}${repoStat(s.turns,'Messages',1)}${repoStat(s.files,'Files')}
                ${repoStat(c.commits,'Commits')}${repoStat(c.prs,'PRs',1)}${repoStat(s.activeDays,'Days')}
              </div>
              <div class="langs reveal d3"><h4>Languages</h4>
                ${r.languages.slice(0,5).map(l=>`<div class="lang"><span class="nm">${esc(l.name)}</span>
                  <span class="track"><span class="fill" style="--w:${(100*l.count/maxL).toFixed(1)}%;background:${l.color}"></span></span>
                  <span class="ct">${fmt(l.count)}</span></div>`).join('')}
              </div>
              <div class="deeds reveal d4"><h4>What you actually did</h4>
                <ul>${r.deeds.slice(0,4).map(d=>`<li>${esc(d)}</li>`).join('')}</ul></div>
            </div>
            <div class="roast reveal d3">
              <div class="tag">🔥 The Roast</div>
              <div class="verdict">${esc(r.verdict)}</div>
              <ul>${r.roasts.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>
            </div>
          </div>`;
    }

    // per repo
    DATA.repos.forEach((r)=>{
      repoPanelIndex[r.id]=panels.length;
      panels.push({ accent:r.accent, accent2:r.accent2, html:`
        <div class="inner">${repoHeadHTML(r)}${repoGridHTML(r)}</div>` });
    });

    // superlatives
    panels.push({ accent:'#f472b6', accent2:'#db2777', html:`
      <div class="inner">
        <div class="eyebrow reveal">The awards nobody asked for</div>
        <h2 class="section-title reveal d1">Superlatives</h2>
        <div class="awards">
          ${DATA.superlatives.map((a,i)=>`<div class="award reveal d${Math.min(i+1,5)}" style="--accent:${a.accent}">
            <div class="em">${a.emoji}</div>
            <div class="aw">${esc(a.award)}</div>
            <div class="rp">${esc(a.repo)}</div>
            <div class="ln">${esc(a.line)}</div></div>`).join('')}
        </div>
      </div>` });

    // final verdict
    panels.push({ accent:'#a78bfa', accent2:'#7c3aed', html:`
      <div class="inner">
        <div class="eyebrow reveal">The final word</div>
        <p class="final-verdict reveal d1">${esc(DATA.finalVerdict).replace(/(\d[\d,]*)/g,'<span class="hl">$1</span>')}</p>
        <div class="btnrow reveal d3">
          <button class="btn" id="replay">↑ Watch again</button>
          <button class="btn ghost" id="copy">Copy the roast</button>
        </div>
        <p class="credit reveal d4">Generated by <b>Copilot Wrap</b> from ${esc(DATA.meta.source)} · ${esc(DATA.meta.generatedAt)}</p>
      </div>` });

    // ---- render ----
    root.innerHTML = panels.map((p,i)=>`
      <section class="panel" data-i="${i}" style="--accent:${p.accent};--accent2:${p.accent2}">
        <div class="orb a"></div><div class="orb b"></div><div class="grain"></div>
        ${p.html}
      </section>`).join('');
    const sections=[...root.querySelectorAll('.panel')];

    // dots
    const dots=document.getElementById('dots');
    dots.innerHTML=sections.map((_,i)=>`<button data-i="${i}" title="Section ${i+1}"></button>`).join('');
    [...dots.children].forEach(b=>b.onclick=()=>sections[+b.dataset.i].scrollIntoView({behavior:'smooth'}));

    // count-up
    function countUp(el){ const tgt=+el.dataset.count; if(el._done)return; el._done=true;
      const dur=1100, t0=performance.now();
      (function step(now){ const p=Math.min(1,(now-t0)/dur); const e=1-Math.pow(1-p,3);
        el.textContent=fmt(Math.round(tgt*e)); if(p<1)requestAnimationFrame(step); })(t0); }

    // accent theming + reveal via IntersectionObserver
    const prog=document.getElementById('progress');
    const io=new IntersectionObserver((entries)=>{
      entries.forEach(en=>{
        if(en.intersectionRatio>0.55){
          const sec=en.target, i=+sec.dataset.i;
          sec.classList.add('in');
          document.documentElement.style.setProperty('--accent', sec.style.getPropertyValue('--accent'));
          document.documentElement.style.setProperty('--accent2', sec.style.getPropertyValue('--accent2'));
          [...dots.children].forEach(d=>d.classList.toggle('active',+d.dataset.i===i));
          prog.style.width=((i+1)/sections.length*100)+'%';
          sec.querySelectorAll('[data-count]').forEach(countUp);
        }
      });
    },{threshold:[0,.55,1]});
    sections.forEach(s=>io.observe(s));
    sections[0].classList.add('in');

    // keyboard nav
    let cur=0;
    function go(d){ cur=Math.max(0,Math.min(sections.length-1,cur+d)); sections[cur].scrollIntoView({behavior:'smooth'}); }
    root.addEventListener('scroll',()=>{ cur=Math.round(root.scrollTop/window.innerHeight); },{passive:true});
    addEventListener('keydown',e=>{
      const m=document.getElementById('modal');
      if(m&&m.classList.contains('open')){ if(e.code==='Escape'){ e.preventDefault(); closeModal(); } return; }
      if(e.code==='ArrowDown'||e.code==='Space'){ e.preventDefault(); go(1); }
      else if(e.code==='ArrowUp'){ e.preventDefault(); go(-1); }
      else if(e.code==='Home'){ e.preventDefault(); sections[0].scrollIntoView({behavior:'smooth'}); }
      else if(e.code==='End'){ e.preventDefault(); sections[sections.length-1].scrollIntoView({behavior:'smooth'}); }
    });

    // buttons
    const onClick=(id,fn)=>{ const el=document.getElementById(id); if(el)el.onclick=fn; };
    onClick('replay',()=>sections[0].scrollIntoView({behavior:'smooth'}));
    onClick('copy',()=>{
      const lines=['🔥 My Copilot Wrapped roast:',''];
      DATA.repos.forEach(r=>{ lines.push(`${r.name} — ${r.verdict}`); if(r.roasts[0])lines.push('  '+r.roasts[0]); });
      lines.push('', DATA.finalVerdict);
      const text=lines.join('\n');
      (navigator.clipboard?navigator.clipboard.writeText(text):Promise.reject())
        .then(()=>{ const b=document.getElementById('copy'); b.textContent='Copied ✓'; setTimeout(()=>b.textContent='Copy the roast',1600); })
        .catch(()=>{ const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(e){} ta.remove();
          const b=document.getElementById('copy'); b.textContent='Copied ✓'; setTimeout(()=>b.textContent='Copy the roast',1600); });
    });

    // ===== repository graph (constellation) + interaction modes =====
    let graphMode = (function(){ try{ return localStorage.getItem('wrapGraphMode')||'scroll'; }catch(e){ return 'scroll'; } })();
    const stage=document.getElementById('graphStage');
    const hintEl=document.getElementById('graphHint');

    function buildGraph(){
      if(!stage) return;
      const repos=DATA.repos, N=repos.length;
      const maxTurns=Math.max.apply(null, repos.map(r=>r.stats.turns))||1;
      // layout adapts to repo count so cards don't collide
      const big = N>4;
      const Rx = N<=2 ? 26 : (big ? 40 : 33);
      const Ry = big ? 37 : 30;
      const cardw = big ? 188 : 212;
      const sizeMul = big ? 0.82 : 1;
      stage.style.setProperty('--cardw', cardw+'px');
      const pos=repos.map((r,i)=>{
        const ang=(-90 + (i+0.5)*(360/N))*Math.PI/180;
        return { cx:50+Rx*Math.cos(ang), cy:50+Ry*Math.sin(ang) };
      });
      // edges
      let lines='';
      repos.forEach((r,i)=>{
        const p=pos[i], w=1.2+2.4*(r.stats.turns/maxTurns);
        const x2=(p.cx*10).toFixed(1), y2=(p.cy*10).toFixed(1);
        lines+=`<line class="edge" data-edge="${r.id}" x1="500" y1="500" x2="${x2}" y2="${y2}" stroke="${r.accent}" stroke-width="${w.toFixed(2)}" vector-effect="non-scaling-stroke" style="color:${r.accent}"/>`;
      });
      const svg=`<svg class="edges" viewBox="0 0 1000 1000" preserveAspectRatio="none">${lines}</svg>`;
      // hub
      const hub=`<div class="hub"><div class="hub-ring"></div><div class="hub-core"><div class="hub-you">YOU</div><div class="hub-user">@${esc(DATA.meta.user)}</div></div></div>`;
      // nodes
      let nodes='';
      repos.forEach((r,i)=>{
        const p=pos[i], s=r.stats, c=r.contributions;
        const scale=((0.9+0.2*(r.stats.turns/maxTurns))*sizeMul).toFixed(3);
        const top=(r.languages&&r.languages[0])||{name:(r.derived&&r.derived.topLang)||'—',color:r.accent};
        const delay=(0.1*i).toFixed(2);
        nodes+=`<button class="node" data-id="${r.id}" aria-label="${esc(r.name)}"
          style="--accent:${r.accent};--accent2:${r.accent2};--scale:${scale};left:${p.cx.toFixed(1)}%;top:${p.cy.toFixed(1)}%;transition-delay:${delay}s">
          <div class="node-card">
            <div class="node-top"><span class="node-dot"></span><span class="node-rank">${r.rank<10?'0':''}${r.rank}</span></div>
            <div class="node-name">${esc(r.name)}</div>
            <div class="node-path">${esc(r.shortRepo||r.fullRepo)}</div>
            <div class="node-stats">
              <span><b>${fmt(s.sessions)}</b>sessions</span>
              <span><b>${fmt(s.turns)}</b>messages</span>
              <span><b>${fmt(c.commits)}</b>commits</span>
            </div>
            <div class="node-lang"><span class="ld" style="background:${top.color}"></span>${esc(top.name)}</div>
            <div class="node-cue" data-cue>View<span>&rarr;</span></div>
          </div>
        </button>`;
      });
      stage.innerHTML=svg+hub+nodes;
      [...stage.querySelectorAll('.node')].forEach(btn=>{
        const id=btn.dataset.id;
        btn.addEventListener('click',()=>activate(id));
        btn.addEventListener('mouseenter',()=>hotEdge(id,true));
        btn.addEventListener('mouseleave',()=>hotEdge(id,false));
      });
    }
    function hotEdge(id,on){ if(stage)[...stage.querySelectorAll(`line[data-edge="${id}"]`)].forEach(l=>l.classList.toggle('hot',on)); }
    function activate(id){
      if(graphMode==='enlarge'){ openModal(id); }
      else { const idx=repoPanelIndex[id]; if(idx!=null) sections[idx].scrollIntoView({behavior:'smooth'}); }
    }

    // mode toggle
    const seg=document.getElementById('modeSeg');
    function setMode(m){
      graphMode=(m==='enlarge')?'enlarge':'scroll';
      try{ localStorage.setItem('wrapGraphMode',graphMode); }catch(e){}
      if(seg)[...seg.children].forEach(b=>b.classList.toggle('active', b.dataset.mode===graphMode));
      if(stage)[...stage.querySelectorAll('[data-cue]')].forEach(c=>{ c.firstChild.textContent = graphMode==='enlarge'?'Enlarge ':'Open '; });
      if(hintEl) hintEl.innerHTML = graphMode==='enlarge'
        ? 'Click a repo to <b>enlarge its card</b> in place. Toggle to <b>Scroll to page</b> to compare.'
        : 'Click a repo to <b>scroll to its page</b>. Toggle to <b>Enlarge card</b> to compare.';
    }
    if(seg)[...seg.children].forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.mode)));
    buildGraph();
    setMode(graphMode);

    // enlarge modal
    const modal=document.getElementById('modal');
    const modalBody=document.getElementById('modalBody');
    let lastFocus=null;
    function openModal(id){
      const r=DATA.repos.find(x=>x.id===id); if(!r||!modal) return;
      lastFocus=document.activeElement;
      document.documentElement.style.setProperty('--accent', r.accent);
      document.documentElement.style.setProperty('--accent2', r.accent2);
      modalBody.innerHTML=repoHeadHTML(r)+repoGridHTML(r);
      modal.setAttribute('aria-hidden','false');
      modal.style.display='flex';
      void modal.offsetWidth;            // reflow so the open transition + lang fills animate
      modal.classList.add('open');
      const mc=document.getElementById('modalClose'); if(mc) mc.focus();
    }
    function closeModal(){
      if(!modal) return;
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden','true');
      setTimeout(()=>{ modal.style.display='none'; },340);
      const cs=sections.find(s=>s.classList.contains('in'))||sections[0];
      if(cs){ document.documentElement.style.setProperty('--accent', cs.style.getPropertyValue('--accent'));
              document.documentElement.style.setProperty('--accent2', cs.style.getPropertyValue('--accent2')); }
      if(lastFocus&&lastFocus.focus) lastFocus.focus();
    }
    if(modal){
      modal.addEventListener('click',e=>{ if(e.target.matches('[data-close]')||e.target===modal) closeModal(); });
      const mc=document.getElementById('modalClose'); if(mc) mc.onclick=closeModal;
    }

    window.__wrap={ sections, DATA, go:(i)=>sections[i].scrollIntoView(),
      setMode, openModal, closeModal, repoPanelIndex, get mode(){ return graphMode; } };
  })();
  </script>
</body>
</html>
